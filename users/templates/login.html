{% extends 'core/base.html' %}
{% load static %}
{% block content %}
<main class="main">
	<div class="page-header">
		<div class="container d-flex flex-column align-items-center">
			<nav aria-label="breadcrumb" class="breadcrumb-nav">
				<div class="container">
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
						<li class="breadcrumb-item"><a href="{% url 'shop' %}">Shop</a></li>
						<li class="breadcrumb-item active" aria-current="page">
							My Account
						</li>
					</ol>
				</div>
			</nav>

			<h1>My Account</h1>
		</div>
	</div>

	<div class="container login-container">
		<div class="row">
			<div class="col-lg-10 mx-auto">
				<div class="row">

					<div class="col-md-6">
						<div class="heading mb-1">
							<h2 class="title">Login</h2>
						</div>

						<form method="POST" action="{% url 'login' %}">
							{% csrf_token %}
							<label for="login-email">
								Username or email address
								<span class="required">*</span>
							</label>
							<input type="text" name="username" class="form-input form-wide" id="login-email"
								required />

							<label for="login-password">
								Password
								<span class="required">*</span>
							</label>
							<input type="password" name="password" class="form-input form-wide" id="login-password"
								required />

							<div class="form-footer">
								<div class="custom-control custom-checkbox mb-0">
									<input type="checkbox" class="custom-control-input" id="lost-password" />
									<label class="custom-control-label mb-0" for="lost-password">Remember
										me</label>
								</div>

								<a href="forgot-password.html"
									class="forget-password text-dark form-footer-right">Forgot
									Password?</a>
							</div>
							<button type="submit" class="btn btn-dark btn-md w-100">
								LOGIN
							</button>
						</form>
						<h4>Don’t have an account? <a href="{% url 'signUp' %}">Sign up</a></h4>
					</div>
				</div>
			</div>
		</div>
	</div>
</main><!-- End .main -->
{% endblock %}
